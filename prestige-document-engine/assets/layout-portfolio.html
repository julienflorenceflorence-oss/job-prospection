<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} - Prestige Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0F1115;
            --accent: #D4AF37;
            --accent-glow: #F7EF8A;
            --text: #F4F4F4;
            --text-dim: #B0B0B0;
            --card-bg: #161a23;
            --radius: 10px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg); color: var(--text); line-height: 1.6; }

        .prestige-container { max-width: 1100px; margin: 0 auto; padding: 60px 20px; }
        
        header { text-align: center; margin-bottom: 60px; border-bottom: 1px solid rgba(212, 175, 55, 0.2); padding-bottom: 30px; }
        h1 { font-family: 'Cinzel'; color: var(--accent); font-size: clamp(2rem, 8vw, 3rem); letter-spacing: 5px; text-transform: uppercase; }
        .subtitle { font-family: 'Cinzel'; color: var(--accent); opacity: 0.7; letter-spacing: 3px; font-size: 0.9rem; margin-top: 10px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        
        .card { 
            background: var(--card-bg); 
            border: 1px solid rgba(212, 175, 55, 0.1); 
            padding: 30px; 
            border-radius: var(--radius); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: var(--accent); transform: scaleX(0); transition: 0.4s; transform-origin: left; }
        .card:hover::before { transform: scaleX(1); }

        .card-title { font-family: 'Cinzel'; color: var(--accent); font-size: 1.2rem; margin-bottom: 15px; }
        .card-content { font-size: 0.9rem; color: var(--text-dim); margin-bottom: 25px; }

        .btn-prestige {
            display: inline-block;
            width: 100%;
            padding: 12px;
            text-align: center;
            border: 1px solid var(--accent);
            color: var(--accent);
            text-decoration: none;
            font-family: 'Cinzel';
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: var(--radius);
            transition: 0.3s;
        }
        .btn-prestige:hover { background: var(--accent); color: var(--bg); font-weight: bold; box-shadow: 0 0 15px var(--accent); }

        .fixed-dock { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 500px; background: rgba(15,17,21,0.9); backdrop-filter: blur(10px);
            border: 1px solid var(--accent); border-radius: var(--radius); padding: 15px;
            display: flex; gap: 15px; z-index: 1000;
        }

        @media (max-width: 600px) { .fixed-dock { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="prestige-container">
        <header>
            <h1>{{title}}</h1>
            <div class="subtitle">{{subtitle}}</div>
        </header>

        <div class="grid">
            <!-- Cards will be injected here -->
            {{cards}}
        </div>

        <footer style="margin-top: 80px; border-top: 1px solid var(--accent); padding-top: 20px; display: flex; justify-content: space-between; font-family: 'Cinzel'; font-size: 0.7rem;">
            <div>{{footer_left}}</div>
            <div>{{footer_right}}</div>
        </footer>
    </div>

    <div class="fixed-dock">
        <a href="#" class="btn-prestige" style="background: var(--accent); color: var(--bg);">Action Principale</a>
        <a href="#" class="btn-prestige">Action Secondaire</a>
    </div>
</body>
</html>
