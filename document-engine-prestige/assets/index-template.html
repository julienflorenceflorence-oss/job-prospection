<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>NOM_DU_DOCUMENT - Édition Prestige</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --bg: #0F1115; --card: #161a23; --text: #F4F4F4; --border-radius: 10px; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; min-height: 100vh; }
        @media screen and (orientation: landscape) and (max-device-width: 1024px) {
            body::after { content: "Veuillez pivoter votre appareil \A en mode Portrait pour une expérience optimale."; white-space: pre-wrap; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); color: var(--gold); display: flex; align-items: center; justify-content: center; z-index: 9999; font-family: 'Cinzel', serif; text-align: center; padding: 30px; font-size: 1.3rem; }
            .content-wrapper, .fixed-dock { display: none !important; }
        }
        .content-wrapper { max-width: 1100px; margin: 0 auto; padding: 60px 20px 40px 20px; position: relative; }
        header { text-align: center; margin-bottom: 60px; padding-bottom: 30px; border-bottom: 1px solid rgba(212, 175, 55, 0.2); }
        h1 { font-family: 'Cinzel'; color: var(--gold); font-size: clamp(1.6rem, 6vw, 2.5rem); letter-spacing: 5px; text-transform: uppercase; margin-bottom: 10px; }
        .subtitle { text-transform: uppercase; letter-spacing: 4px; font-size: 0.75rem; color: var(--gold); font-weight: 300; opacity: 0.8; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        .card { background: var(--card); border: 1px solid rgba(212, 175, 55, 0.15); padding: 35px; display: flex; flex-direction: column; justify-content: space-between; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); border-radius: var(--border-radius); position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); transform: translateX(-100%); transition: 0.5s; }
        .card:hover { transform: translateY(-10px); border-color: var(--gold); box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        .card:hover::before { transform: translateX(100%); }
        .card-cat { font-size: 0.65rem; color: var(--gold); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 15px; font-weight: 700; }
        .card h3 { font-family: 'Cinzel'; color: var(--gold); margin-bottom: 20px; font-size: 1.2rem; letter-spacing: 1px; }
        .card p { font-size: 0.9rem; color: #C0C0C0; margin-bottom: 30px; text-align: left; font-weight: 300; }
        .btn-v { display: block; padding: 14px; border: 1px solid var(--gold); color: var(--gold); text-decoration: none; font-family: 'Cinzel'; font-size: 0.75rem; text-transform: uppercase; text-align: center; transition: 0.3s; border-radius: var(--border-radius); letter-spacing: 2px; background-color: var(--card); }
        .btn-v:hover { background-color: var(--gold); color: var(--bg); }
        .page-footer { margin-top: 100px; padding: 40px 0; border-top: 1px solid var(--gold); display: flex; justify-content: space-between; align-items: center; font-family: 'Cinzel'; font-size: 0.7rem; color: var(--text); letter-spacing: 1px; }
        .fixed-dock { position: fixed; bottom: 25px; left: 20px; right: 20px; max-width: 600px; margin: 0 auto; background: rgba(15, 17, 21, 0.95); backdrop-filter: blur(15px); border: 1px solid var(--gold); border-radius: var(--border-radius); z-index: 1000; padding: 15px; display: flex; justify-content: center; gap: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.9); }
        .btn-d { flex: 1; padding: 15px; border: 2px solid var(--gold); color: var(--gold); text-decoration: none; font-family: 'Cinzel'; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; text-align: center; transition: 0.3s; border-radius: var(--border-radius); }
        .btn-g { background: var(--gold); color: var(--bg); }
        .mobile-spacer { height: 350px; }
        @media (max-width: 768px) { .fixed-dock { flex-direction: column; } .btn-d { width: 100%; } }
    </style>
</head>
<body>
<div class="content-wrapper">
    <header>
        <h1>TITRE_DU_DOCUMENT</h1>
        <div class="subtitle">SLOGAN_OU_CATEGORIE</div>
    </header>
    <div class="grid">
        <div class="card" id="card1">
            <div class="card-cat">CATEGORIE</div>
            <h3>TITRE_CARTE</h3>
            <p>DESCRIPTION_DETAILLEE</p>
            <a href="viewer.html?file=PIECE_JOINTE.pdf&title=TITRE_DOCUMENT&id=card1" class="btn-v">Consulter</a>
        </div>
    </div>
    <footer class="page-footer">
        <div>PROPRIETAIRE &bull; <span>NOM_SECTION</span></div>
        <div>2026 &bull; ÉDITION PRESTIGE</div>
    </footer>
    <div class="mobile-spacer"></div>
</div>
<div class="fixed-dock">
    <a href="#" class="btn-d">Action 1</a>
    <a href="#" class="btn-d btn-g">Action 2 (Principal)</a>
</div>
</body>
</html>
